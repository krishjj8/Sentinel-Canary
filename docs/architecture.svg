<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e;font-family:Arial,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- DEVELOPER -->
<rect x="40" y="30" width="130" height="52" rx="8" fill="#185FA5" stroke="#378ADD" stroke-width="0.5"/>
<text x="105" y="52" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">Developer</text>
<text x="105" y="70" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">git push origin main</text>

<!-- Arrow dev to github -->
<line x1="170" y1="56" x2="228" y2="56" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- GITHUB REPO -->
<rect x="230" y="30" width="130" height="52" rx="8" fill="#185FA5" stroke="#378ADD" stroke-width="0.5"/>
<text x="295" y="52" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">GitHub repo</text>
<text x="295" y="70" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Sentinel-Canary</text>

<!-- Arrow github to actions -->
<line x1="295" y1="82" x2="295" y2="128" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- GITHUB ACTIONS BOX -->
<rect x="80" y="130" width="430" height="180" rx="12" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
<text x="295" y="158" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">GitHub Actions — CI/CD pipeline</text>

<!-- Step 1 Maven -->
<rect x="100" y="175" width="110" height="52" rx="8" fill="#534AB7" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="155" y="196" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="13" font-weight="500">Maven build</text>
<text x="155" y="214" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="11">compile Java</text>

<!-- Arrow step1 to step2 -->
<line x1="210" y1="201" x2="228" y2="201" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2 Trivy -->
<rect x="230" y="175" width="110" height="52" rx="8" fill="#534AB7" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="285" y="196" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="13" font-weight="500">Trivy scan</text>
<text x="285" y="214" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="11">CVE check</text>

<!-- Arrow step2 to step3 -->
<line x1="340" y1="201" x2="358" y2="201" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 Docker -->
<rect x="360" y="175" width="130" height="52" rx="8" fill="#534AB7" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="425" y="196" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="13" font-weight="500">Docker build</text>
<text x="425" y="214" text-anchor="middle" dominant-baseline="central" fill="#CECBF6" font-size="11">multi-stage image</text>

<!-- Arrow to push ECR -->
<line x1="295" y1="227" x2="295" y2="252" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Push to ECR -->
