<text x="340" y="400" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">AWS Cloud — ap-south-1</text>

<!-- ECR box -->
<rect x="480" y="418" width="140" height="52" rx="8" fill="#854F0B" stroke="#EF9F27" stroke-width="0.5"/>
<text x="550" y="439" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="13" font-weight="500">Amazon ECR</text>
<text x="550" y="457" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="11">private registry</text>

<!-- pull image arrow -->
<line x1="478" y1="444" x2="463" y2="444" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="470" y="432" text-anchor="middle" fill="#FAC775" font-size="11">pull image</text>

