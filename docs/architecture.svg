<!-- Stable pods -->
<rect x="100" y="524" width="140" height="56" rx="8" fill="#3B6D11" stroke="#97C459" stroke-width="0.5"/>
<text x="170" y="547" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="13" font-weight="500">v5 stable pods</text>
<text x="170" y="565" text-anchor="middle" dominant-baseline="central" fill="#C0DD97" font-size="11">80% traffic</text>

<!-- Canary pod -->
<rect x="280" y="524" width="140" height="56" rx="8" fill="#854F0B" stroke="#EF9F27" stroke-width="0.5"/>
<text x="350" y="547" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="13" font-weight="500">v6 canary pod</text>
<text x="350" y="565" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="11">20% traffic</text>

<!-- AnalysisTemplate -->
<line x1="170" y1="580" x2="220" y2="598" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<line x1="350" y1="580" x2="308" y2="598" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<rect x="155" y="600" width="210" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="260" y="619" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="13" font-weight="500">AnalysisTemplate</text>
<text x="260" y="637" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="11">checks /version → auto-rollback</text>

<!-- Prometheus -->
<rect x="80" y="672" width="155" height="56" rx="8" fill="#791F1F" stroke="#E24B4A" stroke-width="0.5"/>
<text x="157" y="694" text-anchor="middle" dominant-baseline="central" fill="#FCEBEB" font-size="13" font-weight="500">Prometheus</text>
<text x="157" y="712" text-anchor="middle" dominant-baseline="central" fill="#F7C1C1" font-size="11">scrapes metrics</text>

<!-- Arrow prometheus to grafana -->
<line x1="235" y1="700" x2="278" y2="700" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Grafana -->
<rect x="280" y="672" width="155" height="56" rx="8" fill="#791F1F" stroke="#E24B4A" stroke-width="0.5"/>
<text x="357" y="694" text-anchor="middle" dominant-baseline="central" fill="#FCEBEB" font-size="13" font-weight="500">Grafana</text>
<text x="357" y="712" text-anchor="middle" dominant-baseline="central" fill="#F7C1C1" font-size="11">Golden Signals :32000</text>

<!-- NodePort bar -->
<rect x="80" y="748" width="360" height="32" rx="8" fill="#0F6E56" stroke="#5DCAA5" stroke-width="0.5"/>
<text x="260" y="764" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="12" font-weight="500">NodePort :30080 → /version · /actuator/health</text>

<!-- VPC info -->
<text x="340" y="797" text-anchor="middle" fill="#FAC775" font-size="11">VPC 10.0.0.0/16 · public subnet · security group · Elastic IP</text>

</svg>
