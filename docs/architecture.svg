<text x="260" y="464" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB" font-size="11">4GB RAM · 4GB swap · 20GB gp3</text>

<!-- ARGO ROLLOUTS BOX -->
<rect x="80" y="480" width="360" height="180" rx="10" fill="#0F6E56" stroke="#5DCAA5" stroke-width="0.5"/>
